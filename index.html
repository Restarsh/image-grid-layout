<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Grid Layout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="grid-container">
        <div class="grid-item">
            <img src="https://via.placeholder.com/400x300?text=Foggy+Beach+with+Rock" alt="A foggy beach with a large rock formation in the foreground">
        </div>
        <div class="grid-item">
            <img src="https://via.placeholder.com/400x300?text=Living+Room+with+White+Couch" alt="A living room with a white couch and a round window">
        </div>
        <div class="grid-item">
            <img src="https://via.placeholder.com/400x300?text=Table+with+Food" alt="A table topped with plates and bowls of food">
        </div>
        <div class="grid-item">
            <img src="https://via.placeholder.com/400x300?text=Building+with+Red+Door" alt="A building with a red door and a tree in front of it">
        </div>
        <div class="grid-item">
            <img src="https://via.placeholder.com/400x300?text=Apartment+Buildings" alt="A row of white apartment buildings next to a street">
        </div>
        <div class="grid-item">
            <img src="https://via.placeholder.com/400x300?text=Beach+View+from+Hill" alt="A view of a beach from the top of a hill">
        </div>
    </div>
</body>
</html>
